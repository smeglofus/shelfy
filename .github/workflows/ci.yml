name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: shelfy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff
        working-directory: backend
        run: ruff check app tests

      - name: Mypy (strict)
        working-directory: backend
        run: mypy app tests

      - name: Pytest with coverage gate
        working-directory: backend
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/shelfy_test
        run: pytest --cov=app --cov-fail-under=80 tests

      - name: Check shelf ordering integrity
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/shelfy_test
        run: python ../scripts/check_shelf_ordering_integrity.py


      - name: Generate OpenAPI artifact
        run: python scripts/generate_openapi.py

      - name: Verify OpenAPI artifact is up to date
        run: git diff --exit-code docs/openapi.yaml

  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Test
        working-directory: frontend
        run: npm test -- --run

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Bundle size budget check
        working-directory: frontend
        run: node ../scripts/check_bundle_budget.mjs

  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy scan backend
        uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8
        with:
          scan-type: fs
          scan-ref: backend/
          severity: CRITICAL
          format: sarif
          output: trivy-backend.sarif
          exit-code: 1

      - name: Trivy scan worker
        uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8
        with:
          scan-type: fs
          scan-ref: worker/
          severity: CRITICAL
          format: sarif
          output: trivy-worker.sarif
          exit-code: 1

      - name: Upload Trivy SARIF artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif
          path: |
            trivy-backend.sarif
            trivy-worker.sarif


  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start app stack
        working-directory: infra
        run: docker compose up -d --build

      - name: Wait for backend health
        run: |
          for i in {1..60}; do
            if curl -sf http://localhost:8000/health >/dev/null; then
              echo "Backend healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become healthy in time"
          exit 1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install E2E dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browser
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke regressions
        working-directory: e2e
        env:
          E2E_BASE_URL: http://localhost:5173
          E2E_ADMIN_EMAIL: admin@example.com
          E2E_ADMIN_PASSWORD: change-me
        run: npx playwright test tests/smoke-regressions.spec.ts

      - name: Run E2E tests
        working-directory: e2e
        env:
          E2E_BASE_URL: http://localhost:5173
          E2E_ADMIN_EMAIL: admin@example.com
          E2E_ADMIN_PASSWORD: change-me
        run: npm run e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report
