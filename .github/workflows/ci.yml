name: CI

on:
  pull_request:
    # Skip CI entirely on docs-only and changelog-only PRs — they cannot
    # break runtime behaviour and we were burning ~15 minutes per changelog
    # update. The `paths-ignore` filter is OR'd, so any PR that *also*
    # touches a non-ignored file will still trigger CI.
    paths-ignore:
      - 'docs/**'
      - '**/CHANGELOG.md'
      - '**/*.md'
  push:
    branches: [main]
  workflow_dispatch:

# Cancel any in-progress run for the same PR when a new commit is pushed.
# Saves ~30–50% of CI minutes during iterative push cycles (the most
# expensive failure mode we have). `main` pushes use `run_id` so concurrent
# merges don't cancel each other.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# ── Re-usable Python setup ────────────────────────────────────────────────────
# backend-lint and backend-tests share the same dependency install pattern but
# run as independent jobs so a lint failure never suppresses test results.
# Both are required checks for branch protection (see bottom of this file).
#
# Runner placement:
#
#   All CI jobs run on GitHub-hosted `ubuntu-latest`. Standard hosted runners
#   are FREE and unmetered on public repositories, so there is no minute
#   pressure to offload onto a self-hosted runner — and doing so was a real
#   security risk: the self-hosted CI runner mounted /var/run/docker.sock (root
#   on the prod box) and CI runs on `pull_request`, i.e. potentially untrusted
#   fork code. Hosted runners are ephemeral and isolated, so that whole class
#   of "malicious PR -> RCE on production" goes away.
#
#   Only the Deploy workflow (.github/workflows/deploy.yml) stays on a
#   self-hosted runner (label `shelfy-prod`) — it must run on the box that
#   holds cluster access, and it only ever runs trusted `main`/dispatch code,
#   never fork PRs. The old CI runner (infra/docker-compose.runner.yml) is no
#   longer referenced and can be torn down.

jobs:

  # ── Backend lint (Ruff + Mypy + OpenAPI diff) ─────────────────────────────
  # No Postgres needed — pure static analysis.
  backend-lint:
    name: backend / lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff
        working-directory: backend
        run: ruff check app tests

      - name: Mypy (strict)
        working-directory: backend
        run: mypy app tests

      - name: Generate OpenAPI artifact
        run: python scripts/generate_openapi.py

      - name: Verify OpenAPI artifact is up to date
        run: git diff --exit-code docs/openapi.yaml

  # ── Worker tests (Pytest, no DB — external I/O is monkeypatched) ──────────
  worker-tests:
    name: worker / tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: worker/requirements*.txt

      # pyzbar needs the zbar shared library at import time (mirrors the
      # worker Dockerfile).
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libzbar0

      - name: Install worker dependencies
        working-directory: worker
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Pytest
        working-directory: worker
        run: pytest tests -v --tb=short

  # ── Backend tests (Pytest + coverage gate) ────────────────────────────────
  # Runs unconditionally in parallel with backend-lint — a lint failure never
  # prevents tests from producing a result (which was the original blind spot).
  backend-tests:
    name: backend / tests
    runs-on: ubuntu-latest
    # Postgres as a service container. GitHub-hosted runners publish service
    # containers on localhost, so the test process reaches them directly — no
    # host Docker socket required (that socket, on the old self-hosted runner,
    # was the RCE vector this migration removes).
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: shelfy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d shelfy_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Install pg_trgm extension
        # psql ships preinstalled on ubuntu-latest.
        run: psql postgresql://test:test@localhost:5432/shelfy_test -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"

      - name: Pytest with coverage gate
        working-directory: backend
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/shelfy_test
          TESTING: "true"
        run: |
          echo "::group::pytest output"
          pytest --cov=app --cov-fail-under=80 tests -v --tb=short  # raised from 68% to 80% (issue #161)
          echo "::endgroup::"

      - name: Check shelf ordering integrity
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/shelfy_test
        run: python ../scripts/check_shelf_ordering_integrity.py

  # ── Frontend (lint + test + build + bundle checks) ────────────────────────
  frontend:
    name: frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Test
        working-directory: frontend
        run: npm test -- --run

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Frontend secret-pattern guard
        run: node scripts/check_bundle_secrets.mjs

      - name: Bundle size budget check
        run: node scripts/check_bundle_budget.mjs

  # ── Security scan (Trivy CVE scan) ────────────────────────────────────────
  # Trivy is installed via the official APT repository (CDN-backed, more
  # reliable than the GitHub-action binary fetch that was flaky — issue #152).
  # Scan steps use --exit-code 1 so CRITICAL findings fail the job visibly.
  # Job-level continue-on-error: true keeps this advisory (non-blocking for merges).
  # if-no-files-found: ignore on upload handles the case where install fails.
  security-scan:
    name: security-scan
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget gnupg
          # ``--batch`` is required on the self-hosted runner image
          # (myoung34/github-runner). Without it gpg tries to open /dev/tty
          # which doesn't exist in the container and the dearmor step exits
          # 2. GHA-hosted ubuntu-latest has the tty, so this used to work
          # without --batch; explicit is fine in both environments.
          wget -qO- https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | sudo gpg --batch --yes --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq
          sudo apt-get install -y trivy
          trivy --version

      - name: Trivy scan backend
        run: trivy fs --severity CRITICAL --format sarif --output trivy-backend.sarif --exit-code 1 backend/

      - name: Trivy scan worker
        run: trivy fs --severity CRITICAL --format sarif --output trivy-worker.sarif --exit-code 1 worker/

      - name: Upload Trivy SARIF artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif
          if-no-files-found: ignore
          path: |
            trivy-backend.sarif
            trivy-worker.sarif

  # ── E2E (full stack, runs only when both backend and frontend pass) ────────
  # Skip on draft PRs — Playwright + full-stack boot eats ~5–8 minutes per
  # run and a draft means the author is still iterating. The job re-fires
  # automatically on the next push after un-draft, and you can always
  # trigger it manually via `workflow_dispatch`.
  e2e:
    name: e2e
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-tests, frontend]
    if: github.event.pull_request.draft != true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start app stack
        working-directory: infra
        run: docker compose up -d --build

      - name: Wait for backend health
        run: |
          for i in {1..60}; do
            if curl -sf http://localhost:8000/health >/dev/null; then
              echo "Backend healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become healthy in time"
          exit 1

      - name: Wait for frontend
        run: |
          for i in {1..60}; do
            if curl -sf http://localhost:5173 >/dev/null; then
              echo "Frontend ready"
              exit 0
            fi
            sleep 2
          done
          echo "Frontend did not become ready in time"
          docker compose -f infra/docker-compose.yml logs frontend
          exit 1

      - name: Prepare E2E database
        working-directory: infra
        run: |
          docker compose exec -T backend alembic upgrade head
          docker compose exec -T -e ADMIN_EMAIL=admin@example.com -e ADMIN_PASSWORD=change-me backend python -m app.cli.seed_admin

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install E2E dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browser
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke regressions
        working-directory: e2e
        env:
          E2E_BASE_URL: http://localhost:5173
          E2E_API_BASE_URL: http://localhost:8000
          E2E_ADMIN_EMAIL: admin@example.com
          E2E_ADMIN_PASSWORD: change-me
        run: npx playwright test --project=chromium tests/smoke-regressions.spec.ts

      - name: Run E2E P0 gate (chromium)
        working-directory: e2e
        env:
          E2E_BASE_URL: http://localhost:5173
          E2E_API_BASE_URL: http://localhost:8000
          E2E_ADMIN_EMAIL: admin@example.com
          E2E_ADMIN_PASSWORD: change-me
        run: npx playwright test --project=chromium --grep @p0

      - name: Run E2E tests
        working-directory: e2e
        env:
          E2E_BASE_URL: http://localhost:5173
          E2E_API_BASE_URL: http://localhost:8000
          E2E_ADMIN_EMAIL: admin@example.com
          E2E_ADMIN_PASSWORD: change-me
        run: npm run e2e -- --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report

  # ── E2E P0 mobile (manual trigger only) ────────────────────────────────────
  e2e-p0-mobile:
    name: e2e-p0-mobile
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-tests, frontend]
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start app stack
        working-directory: infra
        run: docker compose up -d --build

      - name: Wait for backend health
        run: |
          for i in {1..60}; do
            if curl -sf http://localhost:8000/health >/dev/null; then
              echo "Backend healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become healthy in time"
          exit 1

      - name: Prepare E2E database
        working-directory: infra
        run: |
          docker compose exec -T backend alembic upgrade head
          docker compose exec -T -e ADMIN_EMAIL=admin@example.com -e ADMIN_PASSWORD=change-me backend python -m app.cli.seed_admin

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install E2E dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium webkit

      - name: Run E2E P0 gate (chromium + mobile-safari)
        working-directory: e2e
        env:
          E2E_BASE_URL: http://localhost:5173
          E2E_API_BASE_URL: http://localhost:8000
          E2E_ADMIN_EMAIL: admin@example.com
          E2E_ADMIN_PASSWORD: change-me
        run: |
          npx playwright test --project=chromium --grep @p0
          npx playwright test --project=mobile-safari --grep @p0

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-p0-mobile
          path: e2e/playwright-report

# ── Required checks for branch protection on `main` ──────────────────────────
#
# Go to Settings → Branches → main → "Require status checks to pass":
#
#   backend / lint     ← job: backend-lint
#   backend / tests    ← job: backend-tests
#   frontend           ← job: frontend
#
# Do NOT add `security-scan` until issue #152 (Trivy flakiness) is resolved.
# Do NOT add `e2e` as required — it takes 5-10 min and blocks hot-fix deploys.
