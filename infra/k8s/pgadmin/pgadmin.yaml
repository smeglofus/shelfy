# pgAdmin — cluster admin tool, ONE instance for the whole cluster. Lives
# outside base/ on purpose: overlays must not stamp a copy per environment.
#
# The pgadmin-secret is NOT in git (public repo). Create it once:
#
#   kubectl -n shelfy create secret generic pgadmin-secret \
#     --from-literal=PGADMIN_DEFAULT_EMAIL=admin@shelfy.cz \
#     --from-literal=PGADMIN_DEFAULT_PASSWORD="$(openssl rand -hex 16)"
#
# Apply: kubectl -n shelfy apply -f infra/k8s/pgadmin/pgadmin.yaml
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pgadmin-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 3Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgadmin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pgadmin
  template:
    metadata:
      labels:
        app: pgadmin
    spec:
      nodeSelector:
        kubernetes.io/hostname: raspberrypi
      securityContext:
        fsGroup: 5050
      containers:
        - name: pgadmin
          image: dpage/pgadmin4:8
          ports:
            - containerPort: 80
          envFrom:
            - secretRef:
                name: pgadmin-secret
          env:
            - name: PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION
              value: "True"
          volumeMounts:
            - name: pgadmin-data
              mountPath: /var/lib/pgadmin
          resources:
            requests:
              memory: "256Mi"
            limits:
              memory: "512Mi"
      volumes:
        - name: pgadmin-data
          persistentVolumeClaim:
            claimName: pgadmin-data
---
apiVersion: v1
kind: Service
metadata:
  name: pgadmin
spec:
  type: ClusterIP
  selector:
    app: pgadmin
  ports:
    - name: http
      port: 80
      targetPort: 80
---
# Bound to an explicit, non-public host so this is NOT a catch-all. A host-less
# rule would catch every request on :80 that no other Ingress claims, quietly
# exposing the DB admin UI. Cloudflare only tunnels shelfy.cz, so
# `pgadmin.shelfy.internal` is unreachable from the internet — resolve it via
# LAN DNS / /etc/hosts when you need the UI, or skip the Ingress entirely and
# use `kubectl -n shelfy port-forward svc/pgadmin 8080:80` (most secure).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pgadmin
spec:
  ingressClassName: traefik
  rules:
    - host: pgadmin.shelfy.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pgadmin
                port:
                  number: 80
