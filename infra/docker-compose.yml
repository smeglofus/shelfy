services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: shelfy
      POSTGRES_USER: shelfy
      POSTGRES_PASSWORD: shelfy
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"

  backend:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ../backend:/app
    command: bash -lc "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://shelfy:shelfy@postgres:5432/shelfy
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"

  worker:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ../worker:/app
    command: bash -lc "pip install -r requirements.txt && celery -A celery_app.celery_app worker --loglevel=info"
    depends_on:
      - redis

  frontend:
    image: node:20
    working_dir: /app
    volumes:
      - ../frontend:/app
    command: bash -lc "npm install && npm run dev"
    depends_on:
      - backend
    ports:
      - "5173:5173"
