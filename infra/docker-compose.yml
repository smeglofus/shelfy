services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shelfy}
      POSTGRES_USER: ${POSTGRES_USER:-shelfy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shelfy}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shelfy} -d ${POSTGRES_DB:-shelfy}"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MC_HOST_local: http://${MINIO_ROOT_USER:-minioadmin}:${MINIO_ROOT_PASSWORD:-minioadmin}@localhost:9000
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "9000:9000"
      - "9001:9001"

  backend:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ../backend:/app
    command: bash -lc "pip install -r requirements.txt -r requirements-dev.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://shelfy:shelfy@postgres:5432/shelfy}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-["http://localhost:5173"]}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-shelfy-images}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8000:8000"

  worker:
    build:
      context: ../worker
      dockerfile: Dockerfile
    working_dir: /app
    volumes:
      - ../worker:/app
    environment:
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://shelfy:shelfy@postgres:5432/shelfy}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-shelfy-images}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-Shelfy <noreply@shelfy.app>}
      APP_URL: ${APP_URL:-https://shelfy.app}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  # One-shot init container: runs as root, chowns the named volume so that the
  # beat service (appuser uid 1000) can write its scheduler-state file.
  # Exits immediately — beat depends on it completing successfully.
  beat-init:
    build:
      context: ../worker
      dockerfile: Dockerfile
    user: "0:0"
    command: ["chown", "-R", "1000:1000", "/var/lib/celerybeat"]
    volumes:
      - celerybeat_state:/var/lib/celerybeat
    restart: "no"
    depends_on:
      redis:
        condition: service_healthy

  beat:
    build:
      context: ../worker
      dockerfile: Dockerfile
    # Runs as appuser (uid 1000) — same non-root user baked into the Dockerfile.
    # beat-init chowns the volume first so this user can write the schedule file.
    command: celery -A celery_beat beat --loglevel=info --schedule=/var/lib/celerybeat/celerybeat-schedule
    volumes:
      - celerybeat_state:/var/lib/celerybeat
    depends_on:
      beat-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://shelfy:shelfy@postgres:5432/shelfy}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BACKUP_BUCKET: ${MINIO_BACKUP_BUCKET:-shelfy-backups}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-30}
      STRIPE_EVENTS_KEEP_DAYS: ${STRIPE_EVENTS_KEEP_DAYS:-90}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-Shelfy <noreply@shelfy.app>}
      APP_URL: ${APP_URL:-https://shelfy.app}

  frontend:
    image: node:20
    working_dir: /app
    volumes:
      - ../frontend:/app
    command: bash -lc "npm install && npm run dev"
    environment:
      VITE_POSTHOG_KEY: ${VITE_POSTHOG_KEY:-}
      VITE_POSTHOG_HOST: ${VITE_POSTHOG_HOST:-https://eu.posthog.com}
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  # Persists Celery beat scheduler state across container restarts.
  # Stores the shelve database that tracks when each periodic task last ran,
  # preventing duplicate task fires on restart.
  celerybeat_state:
