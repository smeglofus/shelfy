# Shelfy monitoring (ADR 010). Scrapes the backend's /metrics endpoint —
# the endpoint is intentionally NOT exposed through the Cloudflare tunnel
# (only /api/* and /health* are), so business gauges stay private.
global:
  scrape_interval: 60s
  evaluation_interval: 60s

scrape_configs:
  - job_name: shelfy-backend
    static_configs:
      # Backend runs in k3s since 2026-07-12; scraped via the LAN-only NodePort
      # (infra/k8s/overlays/prod/backend-nodeport.yaml). Interim until the
      # monitoring stack itself moves into the cluster.
      - targets: ["192.168.88.3:30800"]
